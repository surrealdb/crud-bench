projection = "COUNT"

[[scans.runs]]
name = "select(*) where(string = string) order(datetime DESC) limit(1000)"
projection = "FULL"

[scans.condition]
sql = "status = 'published'"
mysql = "status = 'published'"
neo4j = "r.status = 'published'"
arangodb = "r.status == 'published'"
surrealdb = "status = 'published'"
mongodb = { status = { "$eq" = "published" } }

[scans.order_by]
sql = "created_at DESC"
mysql = "created_at DESC"
neo4j = "r.created_at DESC"
arangodb = "r.created_at DESC"
surrealdb = "created_at DESC"
mongodb = { created_at = -1 }

[scans.with_index]
fields = ["status", "created_at"]

[[scans.with_writes]]
ratio = 0.15
mode = "interleaved"
operation = "UPDATE"

[[scans.with_writes]]
ratio = 0.50
mode = "interleaved"
operation = "UPDATE"


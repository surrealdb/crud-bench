# crud-bench benchmark specification (TOML).
#
# Three parts: document shape (`[value]`), scan workloads (`[[scans]]`), and batch throughput
# tests (`[[batches]]`).
#
# Scans — Each `[[scans]]` row is one logical benchmark. Optional keys include `id`,
# `name`, `projection`, `samples`, paging (`limit`, `start`, `expect`). Use `[[scans.runs]]`
# when the same parameters define multiple named runs (each run has `name` and optional
# `projection`). Conditional scans add `[scans.condition]` with per-dialect filter strings
# (`sql`, `mysql`, `neo4j`, `arangodb`, `surrealdb`) plus inline `mongodb = { ... }` for the
# MongoDB query document. Ordered scans add `[scans.order_by]` (same dialect layout, with
# inline `mongodb` for sort fields). Indexed scans add `[scans.with_index]` (`fields` array,
# optional `index_type` such as `fulltext`). Mixed read/write workloads add one or more
# `[[scans.with_writes]]` blocks (`ratio`, `mode`, `operation`).
#
# Batches — Each `[[batches]]` row names a throughput case: `name`, `operation` (CREATE,
# READ, UPDATE, DELETE), `batch_size`, and `samples` (how many timed iterations).
#
# Value — The `[value]` table defines the generated document shape for each row.
#

# ============================================================================
# value
# ============================================================================

[value]
text = "string:50"
name = "string:20"
age = "int:1..100"
city = "string_enum:London,Paris,Berlin,Tokyo,New York,Sydney,Madrid,Rome,Beijing,Tokyo"
score = "float:0.0..100.0"
number = "int:1..5000"
integer = "int"
active = "bool"
created_at = "datetime"
http_status = "int_enum:200,201,400,404,500"
request_id = "uuid"
status = "string_enum:draft,published,archived"
description = "text:100..400"
tier = "int_enum:0,1,2,3"
words = "words:100;hello,world,foo,bar,test,search,data,query,index,document,database,performance"
tags = [
    "string_enum:alpha,beta,gamma,delta,epsilon",
    "string_enum:theta,iota,kappa,lambda,mu",
    "string_enum:nu,xi,omicron,pi,rho"
]
geography.code = "string:3"
geography.text = "string:15"
geography.location = "string_enum:Africa,Antarctica,Asia,Europe,North America,South America,Oceania"
geography.description = "words:100;hello,world,foo,bar,test,search,data,query,index,document,database,performance"

# ============================================================================
# count
# ============================================================================

[[scans]]
id = "count"
name = "count()"
projection = "COUNT"
samples = 1000

# ============================================================================
# limit
# ============================================================================

[[scans]]
id = "limit"
samples = 10
limit = 100
expect = 100

[[scans.runs]]
name = "select(id) limit(100)"
projection = "ID"

[[scans.runs]]
name = "select(*) limit(100)"
projection = "FULL"

# ============================================================================
# start_limit
# ============================================================================

[[scans]]
id = "start_limit"
samples = 10
start = 5000
limit = 100
expect = 100

[[scans.runs]]
name = "select(id) start(5000) limit(100)"
projection = "ID"

[[scans.runs]]
name = "select(*) start(5000) limit(100)"
projection = "FULL"

# ============================================================================
# where_field_integer_eq
# ============================================================================

[[scans]]
id = "where_field_integer_eq"
samples = 10

[[scans.runs]]
name = "count(*) where(integer = integer)"
projection = "COUNT"

[[scans.runs]]
name = "select(*) where(integer = integer)"
projection = "FULL"

[scans.condition]
sql = "number = 21"
mysql = "number = 21"
neo4j = "r.number = 21"
arangodb = "r.number == 21"
surrealdb = "number = 21"
mongodb = { number = { "$eq" = 21 } }

[scans.with_index]
fields = ["number"]

[[scans.with_writes]]
ratio = 0.15
mode = "interleaved"
operation = "UPDATE"

[[scans.with_writes]]
ratio = 0.50
mode = "interleaved"
operation = "UPDATE"

# ============================================================================
# where_field_integer_eq_or_eq
# ============================================================================

[[scans]]
id = "where_field_integer_eq_or_eq"
samples = 10

[[scans.runs]]
name = "count(*) where(integer = integer OR integer = integer)"
projection = "COUNT"

[[scans.runs]]
name = "select(*) where(integer = integer OR integer = integer)"
projection = "FULL"

[scans.condition]
sql = "number = 21 OR number = 22"
mysql = "number = 21 OR number = 22"
neo4j = "r.number = 21 OR r.number = 22"
arangodb = "r.number == 21 OR r.number == 22"
surrealdb = "number = 21 OR number = 22"
mongodb = { "$or" = [
    { number = { "$eq" = 21 } },
    { number = { "$eq" = 22 } }
] }

[scans.with_index]
fields = ["number"]

[[scans.with_writes]]
ratio = 0.15
mode = "interleaved"
operation = "UPDATE"

[[scans.with_writes]]
ratio = 0.50
mode = "interleaved"
operation = "UPDATE"

# ============================================================================
# where_field_integer_gte_lte
# ============================================================================

[[scans]]
id = "where_field_integer_gte_lte"
samples = 10

[[scans.runs]]
name = "count(*) where(integer >= integer AND integer <= integer)"
projection = "COUNT"

[[scans.runs]]
name = "select(*) where(integer >= integer AND integer <= integer)"
projection = "FULL"

[scans.condition]
sql = "number >= 18 AND number <= 21"
mysql = "number >= 18 AND number <= 21"
neo4j = "r.number >= 18 AND r.number <= 21"
arangodb = "r.number >= 18 AND r.number <= 21"
surrealdb = "number >= 18 AND number <= 21"
mongodb = { number = { "$gte" = 18, "$lte" = 21 } }

[scans.with_index]
fields = ["number"]

[[scans.with_writes]]
ratio = 0.15
mode = "interleaved"
operation = "UPDATE"

[[scans.with_writes]]
ratio = 0.50
mode = "interleaved"
operation = "UPDATE"

# ============================================================================
# where_field_integer_in_many
# ============================================================================

[[scans]]
id = "where_field_integer_in_many"
samples = 10
limit = 1000

[[scans.runs]]
name = "count(*) where(integer IN [integer]) limit(1000)"
projection = "COUNT"

[[scans.runs]]
name = "select(*) where(integer IN [integer]) limit(1000)"
projection = "FULL"

[scans.condition]
sql = "number IN (18, 21, 30, 40, 50, 60)"
mysql = "number IN (18, 21, 30, 40, 50, 60)"
neo4j = "r.number IN [18, 21, 30, 40, 50, 60]"
arangodb = "r.number IN [18, 21, 30, 40, 50, 60]"
surrealdb = "number IN [18, 21, 30, 40, 50, 60]"
mongodb = { number = { "$in" = [
    18,
    21,
    30,
    40,
    50,
    60
] } }

[scans.with_index]
fields = ["number"]

[[scans.with_writes]]
ratio = 0.15
mode = "interleaved"
operation = "UPDATE"

[[scans.with_writes]]
ratio = 0.50
mode = "interleaved"
operation = "UPDATE"


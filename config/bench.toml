# ============================================================================
# where_field_many_contains_string_order_by_desc
# ============================================================================

[[scans]]
id = "where_field_many_contains_string_order_by_desc"
samples = 10
limit = 1000

[[scans.runs]]
name = "count(*) where([string] CONTAINS string) order(datetime DESC) limit(1000)"
projection = "COUNT"

[[scans.runs]]
name = "select(*) where([string] CONTAINS string) order(datetime DESC) limit(1000)"
projection = "FULL"

[scans.condition]
sql = "tags CONTAINS 'omicron'"
mysql = "JSON_CONTAINS(tags, JSON_QUOTE('omicron'), '$')"
neo4j = "r.tags CONTAINS 'omicron'"
arangodb = "'omicron' IN r.tags"
surrealdb = "tags CONTAINS 'omicron'"
mongodb = { tags = "omicron" }

[scans.order_by]
sql = "created_at DESC"
mysql = "created_at DESC"
neo4j = "r.created_at DESC"
arangodb = "r.created_at DESC"
surrealdb = "created_at DESC"
mongodb = { created_at = -1 }

[scans.with_index]
fields = ["tags.*", "created_at"]

[[scans.with_writes]]
ratio = 0.15
mode = "interleaved"
operation = "UPDATE"

[[scans.with_writes]]
ratio = 0.50
mode = "interleaved"
operation = "UPDATE"

# ============================================================================
# where_field_fulltext_single
# ============================================================================

[[scans]]
id = "where_field_fulltext_single"
name = "select(*) where(string @@ string) limit(1000) - BM25"
projection = "FULL"
samples = 10
limit = 1000

[scans.condition]
sql = "to_tsvector('english', words) @@ to_tsquery('english', 'hello')"
mysql = "MATCH(words) AGAINST('hello' IN NATURAL LANGUAGE MODE)"
neo4j = "hello"
surrealdb = "words @@ 'hello'"
mongodb = { "$text" = { "$search" = "hello" } }

[scans.with_index]
fields = ["words"]
index_type = "fulltext"

# ============================================================================
# where_field_fulltext_multi_and
# ============================================================================

[[scans]]
id = "where_field_fulltext_multi_and"
name = "select(*) where(string @@ string AND string @@ string) limit(1000) - BM25"
projection = "FULL"
samples = 10
limit = 1000

[scans.condition]
sql = "to_tsvector('english', words) @@ to_tsquery('english', 'hello & world')"
mysql = "MATCH(words) AGAINST('+hello +world' IN NATURAL LANGUAGE MODE)"
neo4j = "hello AND world"
surrealdb = "words @@ 'hello' AND words @@ 'world'"
mongodb = { "$text" = { "$search" = "hello world" } }

[scans.with_index]
fields = ["words"]
index_type = "fulltext"

# ============================================================================
# where_field_fulltext_multi_or
# ============================================================================

[[scans]]
id = "where_field_fulltext_multi_or"
name = "select(*) where(string @@ string OR string @@ string) limit(1000) - BM25"
projection = "FULL"
samples = 10
limit = 1000

[scans.condition]
sql = "to_tsvector('english', words) @@ to_tsquery('english', 'foo | bar')"
mysql = "MATCH(words) AGAINST('foo bar' IN NATURAL LANGUAGE MODE)"
neo4j = "foo OR bar"
surrealdb = "words @@ 'foo' OR words @@ 'bar'"
mongodb = { "$text" = { "$search" = "foo bar" } }

[scans.with_index]
fields = ["words"]
index_type = "fulltext"

